<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#7b2d52"/>
<title>Cœur·Lingo — Learn German</title>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<style>
:root{
  --coral:#ff6b6b; --coral-d:#e8516a; --plum:#7b2d52; --plum-d:#5a1f3c;
  --gold:#f4b942; --bg:#fff7f3; --card:#ffffff; --ink:#2c1a24; --muted:#8a6f7c;
  --good:#28a878; --bad:#e8516a; --line:#f0dfe4; --shadow:0 6px 22px rgba(123,45,82,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.45;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));max-width:520px;margin:0 auto;}
h1,h2,h3{margin:0 0 .4em;line-height:1.2}
button{font-family:inherit;cursor:pointer;border:none}
.hidden{display:none!important}
header{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,var(--plum),var(--plum-d));
  color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{font-weight:800;letter-spacing:.3px;font-size:18px;display:flex;align-items:center;gap:7px}
.streakpill{background:rgba(255,255,255,.16);border-radius:999px;padding:5px 11px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:5px}
.iconbtn{background:rgba(255,255,255,.14);color:#fff;border-radius:10px;width:38px;height:38px;font-size:18px}
.xpbar{height:7px;background:rgba(255,255,255,.2);border-radius:999px;margin-top:12px;overflow:hidden}
.xpbar>i{display:block;height:100%;background:var(--gold);border-radius:999px;transition:width .5s}
.xpmeta{display:flex;justify-content:space-between;font-size:12px;opacity:.9;margin-top:5px}
.lvlbar{height:6px;background:rgba(255,255,255,.2);border-radius:999px;margin-top:4px;overflow:hidden}
.lvlbar>i{display:block;height:100%;background:#9be7c4;border-radius:999px;transition:width .5s}
main{padding:16px}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.card h2{font-size:17px}
.muted{color:var(--muted)}.sm{font-size:13px}.center{text-align:center}
.big-cta{width:100%;background:linear-gradient(135deg,var(--coral),var(--coral-d));color:#fff;
  font-size:18px;font-weight:800;padding:18px;border-radius:16px;box-shadow:0 8px 20px rgba(232,81,106,.35)}
.big-cta:active{transform:scale(.98)}
.btn{background:var(--plum);color:#fff;padding:12px 16px;border-radius:12px;font-weight:700;font-size:15px}
.btn.ghost{background:#fff;color:var(--plum);border:1.5px solid var(--line)}
.btn.gold{background:var(--gold);color:#5a3a00}
.btn.block{width:100%;display:block;text-align:center}
.btn:disabled{opacity:.5}
.row{display:flex;gap:10px}.row>*{flex:1}
.compliment{background:linear-gradient(135deg,#fff,#fff0f4);border:1.5px dashed var(--coral);
  border-radius:16px;padding:14px 16px;font-style:italic;color:var(--plum);font-weight:600;margin-bottom:14px}
.chk{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
.chk:last-child{border-bottom:none}
.chk .box{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:15px;color:#fff}
.chk.done .box{background:var(--good);border-color:var(--good)}
.chk.done .lbl{text-decoration:line-through;color:var(--muted)}
.chk .lbl{flex:1;font-weight:600;font-size:15px}.chk .xp{font-size:12px;color:var(--gold);font-weight:800}
.sprog{height:8px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:16px}
.sprog>i{display:block;height:100%;background:var(--coral);transition:width .4s}
.flash{font-size:13px;font-weight:700;padding:10px 12px;border-radius:10px;margin-top:12px}
.flash.ok{background:#e7f7ef;color:var(--good)}.flash.no{background:#fdeaee;color:var(--bad)}
.qtext{font-size:20px;font-weight:700;margin:6px 0 16px}
.opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);
  border-radius:12px;padding:14px;margin-bottom:10px;font-size:16px;font-weight:600}
.opt.right{border-color:var(--good);background:#e7f7ef}
.opt.wrong{border-color:var(--bad);background:#fdeaee}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:50px}
.chip{background:var(--plum);color:#fff;padding:10px 13px;border-radius:10px;font-weight:700;font-size:15px}
.chip.pool{background:#fff;color:var(--plum);border:1.5px solid var(--line)}
.flip{perspective:1000px;height:190px;margin-bottom:14px}
.flip-in{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flip.on .flip-in{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;display:grid;place-items:center;
  text-align:center;padding:18px;border:1.5px solid var(--line);background:#fff}
.face.back{transform:rotateY(180deg);background:linear-gradient(135deg,#fff,#fff3f6)}
.face .big{font-size:26px;font-weight:800;color:var(--plum)}
.spk{background:var(--gold);color:#5a3a00;border-radius:999px;padding:10px 16px;font-weight:700;font-size:15px;display:inline-flex;gap:6px;align-items:center}
.bigspk{background:var(--gold);color:#5a3a00;border-radius:16px;padding:22px;font-weight:800;font-size:18px;width:100%;display:flex;gap:10px;align-items:center;justify-content:center}
.lg{display:flex;align-items:center;gap:12px;padding:11px 6px;border-radius:12px}
.lg.me{background:#fff3f6;border:1.5px solid var(--coral)}
.lg .rk{width:26px;font-weight:800;color:var(--muted);text-align:center}
.lg .av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:20px;background:#f3e6ec}
.lg .nm{flex:1;font-weight:700}.lg .pts{font-weight:800;color:var(--plum)}
.svgwrap{width:100%;overflow:hidden}
.heat{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.heat span{aspect-ratio:1;border-radius:5px;background:#f0dfe4}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#fff3f6;border-radius:14px;padding:12px;text-align:center}
.stat b{font-size:24px;color:var(--plum);display:block}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.badge{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:10px 6px;text-align:center;font-size:12px}
.badge .ic{font-size:26px;filter:grayscale(1);opacity:.35}
.badge.on .ic{filter:none;opacity:1}.badge.on{border-color:var(--gold);background:#fffaf0}
.coupon{display:flex;gap:12px;align-items:center;border:1.5px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
.coupon.on{border-color:var(--gold);background:linear-gradient(135deg,#fffaf0,#fff)}
.coupon.locked{opacity:.55}
.coupon .d{font-size:24px;font-weight:800;color:var(--coral);width:54px;text-align:center;flex:none}
.coupon .t{flex:1}.coupon .t b{display:block}
.coupon .st{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--gold)}
nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:#fff;
  border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:40}
nav button{flex:1;background:none;padding:9px 0 8px;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px}
nav button .ni{font-size:21px}
nav button.on{color:var(--plum);font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(44,26,36,.55);z-index:60;display:grid;place-items:center;padding:22px;animation:fade .2s}
.sheet{background:#fff;border-radius:22px;padding:24px;max-width:460px;width:100%;text-align:center;box-shadow:var(--shadow)}
.sheet .emo{font-size:60px;animation:pop .5s}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
input,select{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;font-family:inherit;margin-bottom:12px;background:#fff}
label{font-weight:700;font-size:14px;display:block;margin-bottom:5px}
canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:55}
.tag{display:inline-block;background:#f3e6ec;color:var(--plum);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700;margin:2px 2px 8px 0}
.step{display:flex;gap:11px;margin-bottom:13px}.step .n{width:26px;height:26px;border-radius:50%;background:var(--plum);color:#fff;font-weight:800;display:grid;place-items:center;flex:none;font-size:14px}
code{background:#f3e6ec;padding:2px 6px;border-radius:6px;font-size:13px;color:var(--plum-d);word-break:break-all}
.match{display:flex;gap:10px}.match .col{flex:1;display:flex;flex-direction:column;gap:8px}
.pairbtn{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 10px;font-weight:600;font-size:14px;text-align:center}
.pairbtn.sel{border-color:var(--plum);background:#fff3f6}
.pairbtn.ok{border-color:var(--good);background:#e7f7ef;opacity:.6}
.pairbtn.err{border-color:var(--bad);background:#fdeaee}
.lvltag{font-size:11px;font-weight:800;color:#9be7c4;background:rgba(0,0,0,.04);border-radius:6px;padding:1px 6px}
</style>
</head>

<header>
  <div class="hrow">
    <div class="brand">💞 Cœur·Lingo</div>

      <div class="streakpill">🔥 <span id="hStreak">0</span></div>
      <button class="iconbtn" onclick="show('settings')">⚙️</button>
    </div>
  </div>
  <div class="xpbar"><i id="hXp" style="width:0"></i></div>
  <div class="xpmeta"><span id="hXpToday">0 / 50 XP</span><span id="hLevel">A2</span></div>
  <div class="lvlbar"><i id="hLvlProg" style="width:0"></i></div>
</header>

<main>
  <section id="view-home" class="view"></section>
  <section id="view-session" class="view hidden"></section>
  <section id="view-liga" class="view hidden"></section>
  <section id="view-stats" class="view hidden"></section>
  <section id="view-reward" class="view hidden"></section>
  <section id="view-settings" class="view hidden"></section>
  <section id="view-blocker" class="view hidden"></section>
</main>

<nav>

  <button data-nav="reward" onclick="show('reward')"><span class="ni">🎁</span><span class="nl" data-k="nav_reward"></span></button>
  <button data-nav="stats" onclick="show('stats')"><span class="ni">📈</span><span class="nl" data-k="nav_stats"></span></button>
</nav>

<canvas id="confetti" class="hidden"></canvas>
<div id="modal-root"></div>

/* ---------- dates ---------- */
const pad=n=>String(n).padStart(2,"0");
function todayStr(d=new Date()){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/864e5);}
function addDays(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return todayStr(d);}
function dayIndex(){return daysBetween("2026-01-01",todayStr());}
function weekKey(s){const d=new Date(s);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return todayStr(d);}
function rnd(a,b){return a+Math.random()*(b-a);}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function levelIdx(l){return LEVELS.indexOf(l);}

/* ---------- daily plan ---------- */
function planForDay(){
  const seed=dayIndex();
  const rotA=["uebersetzen","satzbau"][seed%2];
  const rotB=["luecke","hoeren","konjugation"][seed%3];
  return ["vocab",rotA,rotB,"dialog","grammatik","paare"];
}
function ensureChecklist(){
  const tt=todayStr();
  if(!S.checkliste||S.checkliste.datum!==tt){
    S.checkliste={datum:tt,plan:planForDay()};
    S.checkliste.items=S.checkliste.plan.map(ty=>({ty,erledigt:false}));save();
  }
}
function checklistDone(){return S.checkliste.items.every(i=>i.erledigt);}

/* ---------- XP / SRS ---------- */
function rolloverXp(){const tt=todayStr();if(S.xp.heuteDatum!==tt){S.xp.heute=0;S.xp.heuteDatum=tt;}}
function addXp(n){rolloverXp();S.xp.heute+=n;S.xp.gesamt+=n;S.liga.meineXpWoche+=n;save();renderHeader();}
function srsUpdate(id,correct){
  let c=S.srs[id]||{ease:2.3,intv:0,reps:0,due:dayIndex()};
  if(correct){c.reps++;c.ease=Math.min(2.8,c.ease+0.1);c.intv=c.reps<=1?1:c.reps===2?3:Math.round(c.intv*c.ease);}
  else{c.reps=0;c.ease=Math.max(1.3,c.ease-0.2);c.intv=1;}
  c.due=dayIndex()+c.intv;S.srs[id]=c;save();
}
function isDue(id){const c=S.srs[id];return c&&c.due<=dayIndex();}
function record(correct,lvl){
  SES.total++;if(correct)SES.correct++;
  S.recent.push(correct?1:0);if(S.recent.length>40)S.recent.shift();
  if(correct){const Lv=lvl||S.user.niveau;if(S.mastery[Lv]!=null)S.mastery[Lv]++;}
  save();maybeLevelUp();
}
function markSeen(id){if(!S.seenIds.includes(id)){S.seenIds.push(id);S.wordsSeen++;}}
function maybeLevelUp(){
  const i=curIdx();if(i>=LEVELS.length-1)return;
  const lvl=S.user.niveau;
  if(S.mastery[lvl]>=LEVELUP_TH[lvl]){const nx=LEVELS[i+1];S.user.niveau=nx;save();grantBadge(nx.toLowerCase());SES&&(SES.leveledTo=nx);}
}
function themedPool(arr){return (SES&&SES.theme)?arr.filter(it=>it.thema===SES.theme):arr;}
function poolFor(arr){const ci=curIdx();return themedPool(arr).filter(it=>levelIdx(it.lvl)<=ci);}
function pickSRS(arr,n){
  const pool=poolFor(arr);
  const due=shuffle(pool.filter(it=>isDue(it.id)));
  const fresh=shuffle(pool.filter(it=>!S.srs[it.id]));
  const seen=shuffle(pool.filter(it=>S.srs[it.id]&&!isDue(it.id)));
  const acc=recentAcc();
  const wantNew=acc>0.8?Math.ceil(n*0.6):acc<0.55?Math.floor(n*0.25):Math.ceil(n*0.45);
  const out=[];
  for(const it of due){if(out.length>=n-Math.min(wantNew,fresh.length))break;out.push(it);}
  for(const it of fresh){if(out.length>=n)break;out.push(it);}
  for(const it of due){if(out.length>=n)break;if(!out.includes(it))out.push(it);}
  for(const it of seen){if(out.length>=n)break;out.push(it);}
  return shuffle(out).slice(0,n);
}
function pickLevel(arr,n){
  const ci=curIdx(),acc=recentAcc();let pool=poolFor(arr);
  const cur=pool.filter(it=>levelIdx(it.lvl)===ci),lower=pool.filter(it=>levelIdx(it.lvl)<ci);
  let ranked=acc<0.55?[...shuffle(lower),...shuffle(cur)]:[...shuffle(cur),...shuffle(lower)];
  if(ranked.length<n)ranked=shuffle(pool);
  return ranked.slice(0,n);
}

/* ---------- complete ---------- */
function completeSession(durSec){
  const tt=todayStr();
  if(S.streak.letzterTag!==tt){
    if(S.streak.letzterTag===addDays(tt,-1)||S.streak.letzterTag==="")S.streak.aktuell+=1;
    else if(daysBetween(S.streak.letzterTag,tt)>1&&S.streak.freezes>0){S.streak.freezes-=1;S.streak.aktuell+=1;}
    else S.streak.aktuell=1;
    S.streak.letzterTag=tt;S.streak.längste=Math.max(S.streak.längste,S.streak.aktuell);
  }
  S.sessions.push({datum:tt,dauerSek:durSec,xp:SES.correct*5,aufgaben:SES.total,genauigkeit:SES.total?Math.round(SES.correct/SES.total*100):0});
  addXp(20);
  if(SES.total>0&&SES.correct===SES.total)grantBadge("perfect");
  const nb=checkBadges(),nc=checkCoupons(),lvl=SES.leveledTo;
  advanceLiga();save();celebrate(nb,nc,lvl);
}
function hasBadge(id){return S.badges.some(b=>b.id===id);}
function grantBadge(id){if(BADGES.find(b=>b.id===id)&&!hasBadge(id)){S.badges.push({id,datum:todayStr()});save();return true;}return false;}
function checkBadges(){
  const got=[];const m={first:S.sessions.length>=1,s3:S.streak.aktuell>=3,s7:S.streak.aktuell>=7,s30:S.streak.aktuell>=30,w50:S.wordsSeen>=50,w100:S.wordsSeen>=100};
  for(const k in m)if(m[k]&&grantBadge(k))got.push(BADGES.find(b=>b.id===k));
  return got;
}
function checkCoupons(){
  let g=null;
  MILESTONES.forEach(m=>{if(S.streak.aktuell>=m&&!S.coupons.some(c=>c.meilenstein===m)){S.coupons.push({meilenstein:m,status:"verdient",datum:todayStr()});g=m;}});
  save();return g;
}
function advanceLiga(){
  const tt=todayStr(),wk=weekKey(tt);
  if(S.liga.week!==wk){S.liga.week=wk;S.liga.meineXpWoche=0;S.liga.npcs.forEach(n=>n.xpWoche=Math.round(rnd(0,n.rate)));}
  const gap=Math.max(0,daysBetween(S.liga.lastTag,tt));
  for(let d=0;d<gap;d++)S.liga.npcs.forEach(n=>{let g=rnd(n.rate*0.5,n.rate*1.4);if(n.xpWoche>S.liga.meineXpWoche+40)g*=0.55;if(n.xpWoche<S.liga.meineXpWoche-40)g*=1.4;n.xpWoche+=Math.round(g);});
  S.liga.lastTag=tt;if(ligaSorted()[0].me)grantBadge("beatall");save();
}
function ligaSorted(){
  const a=[...S.liga.npcs.map(n=>({name:n.name,av:n.av,pts:n.xpWoche,me:false})),{name:S.user.name||"You",av:"💖",pts:S.liga.meineXpWoche,me:true}];
  return a.sort((x,y)=>y.pts-x.pts);
}

/* ---------- mail ---------- */
async function sendMail(subject,body,once){
  if(once&&S.mailSent[once])return;
  if(!S.user.freundEmail||!S.user.w3key)return;
  try{await fetch("https://api.web3forms.com/submit",{method:"POST",headers:{"Content-Type":"application/json",Accept:"application/json"},
    body:JSON.stringify({access_key:S.user.w3key,subject,from_name:"Cœur·Lingo",message:body,email:S.user.freundEmail})});
    if(once){S.mailSent[once]=todayStr();save();}
  }catch(e){console.warn("mail",e);}
}
function rank(){return ligaSorted().findIndex(x=>x.me)+1;}
function weeklyReportIfDue(){
  const wk=weekKey(todayStr()),tag="week_"+wk;
  if(S.mailSent[tag]||S.sessions.length<1)return;
  const lw=addDays(todayStr(),-7),ses=S.sessions.filter(s=>s.datum>=lw);if(!ses.length)return;
  const min=Math.round(ses.reduce((a,s)=>a+s.dauerSek,0)/60);
  sendMail(t("mail_week_subj",S.user.name,min),t("mail_week_body",S.user.name,ses.length,min,S.streak.aktuell,S.user.niveau,S.wordsSeen,rank()),tag);
}

  if(!SES.sel){if(b.dataset.side!=="L")return;SES.sel=b;b.classList.add("sel");return;}
  if(b.dataset.side==="L"){SES.sel.classList.remove("sel");SES.sel=b;b.classList.add("sel");return;}
  const ok=SES.sel.dataset.i===b.dataset.i;
  if(ok){SES.sel.classList.remove("sel");SES.sel.classList.add("ok");b.classList.add("ok");SES.matched++;record(true,SES.pset.lvl);addXp(4);
    if(SES.matched===SES.pset.pairs.length)document.getElementById("fb").innerHTML=`<div class="flash ok">${t("paare_done")}</div><button class="btn block" style="margin-top:12px" onclick="blockDone()">${t("cont")}</button>`;
  }else{b.classList.add("err");const s=SES.sel;setTimeout(()=>{b.classList.remove("err");s.classList.remove("sel");},500);SES.sel=null;record(false,SES.pset.lvl);}
}

let deVoice=null;

function speak(tx){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(tx);u.lang="de-DE";u.rate=.9;if(deVoice)u.voice=deVoice;speechSynthesis.speak(u);}catch(e){}}

    sendMail(t("mail_level_subj",S.user.name,lvl),t("mail_level_body",S.user.name,lvl),"level_"+lvl);}
  if(nc){extra+=`<div class="card on" style="border:1.5px solid var(--gold);background:#fffaf0;margin:14px 0 0"><div style="font-size:34px">🎟️</div><b>${t("coupon_unlocked")}</b><div class="muted sm">${esc(cT(nc))} — ${esc(cD(nc))}</div><div class="sm" style="color:var(--good);margin-top:6px">${t("coupon_notified")}</div></div>`;
    sendMail(t("mail_coupon_subj",S.user.name,cT(nc)),t("mail_coupon_body",S.user.name,nc,cT(nc),cD(nc)),"coupon_"+nc);}
  if(nb&&nb.length){extra+=`<div class="sm" style="margin-top:12px">${t("badges_line",nb.map(b=>b.ic+" "+bT(b)).join(" · "))}</div>`;
    sendMail(t("mail_badge_subj",S.user.name),t("mail_badge_body",S.user.name,nb.map(b=>bT(b)).join(", "),S.streak.aktuell),"badge_"+todayStr()+"_"+nb.map(b=>b.id).join(""));}
  const acc=S.sessions.length?S.sessions[S.sessions.length-1].genauigkeit:0;
  openModal(`<div class="emo">🎉</div><h2>${t("celebr_title")}</h2><p class="muted">${t("celebr_sub",S.streak.aktuell,acc)}</p>${extra}
    <button class="big-cta" style="margin-top:18px" onclick="closeModal();SES=null;show('home')">${t("continueBtn")}</button>
    <button class="btn ghost block" style="margin-top:10px" onclick="closeModal();SES=null;shareWithPartner()">${t("show_partner")}</button>`);
}
function confetti(){
  const c=document.getElementById("confetti");c.classList.remove("hidden");
  const ctx=c.getContext("2d");c.width=innerWidth;c.height=innerHeight;
  const cols=["#ff6b6b","#f4b942","#7b2d52","#28a878","#ff9eb5"];
  let P=Array.from({length:140},()=>({x:Math.random()*c.width,y:-20-Math.random()*c.height,r:4+Math.random()*6,c:cols[Math.floor(Math.random()*cols.length)],vy:2+Math.random()*4,vx:-2+Math.random()*4,a:Math.random()*6}));
  let f=0;(function loop(){ctx.clearRect(0,0,c.width,c.height);f++;P.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.a+=.1;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);ctx.restore();});if(f<160)requestAnimationFrame(loop);else c.classList.add("hidden");})();
}

function lastNDays(n){const a=[];for(let i=n-1;i>=0;i--)a.push(addDays(todayStr(),-i));return a;}
function secOn(d){return S.sessions.filter(s=>s.datum===d).reduce((a,s)=>a+s.dauerSek,0);}
function minOn(d){return Math.round(secOn(d)/60);}
function barChart(data){
  const W=320,H=140,pad=22,max=Math.max(1,...data.map(d=>d.val)),gap=(W-pad*2)/data.length,bw=gap*0.62;
  return `<div class="svgwrap"><svg viewBox="0 0 ${W} ${H}" width="100%">${data.map((d,i)=>{const h=(d.val/max)*(H-40),x=pad+i*gap+(gap-bw)/2,y=H-22-h;return `<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(2,h)}" rx="4" fill="#e8516a"/><text x="${x+bw/2}" y="${H-8}" font-size="9" fill="#8a6f7c" text-anchor="middle">${d.label}</text>${d.val>0?`<text x="${x+bw/2}" y="${y-3}" font-size="9" fill="#7b2d52" text-anchor="middle" font-weight="700">${d.val}</text>`:''}`}).join("")}</svg></div><p class="sm muted center">${t("unit_min")}</p>`;
}
function renderReward(){
  document.getElementById("view-reward").innerHTML=`<div class="card"><h2>${t("rewards_title")}</h2><p class="muted sm">${t("rewards_sub")}</p>
     ${MILESTONES.map(m=>{const e=S.coupons.find(c=>c.meilenstein===m);return `<div class="coupon ${e?'on':'locked'}"><div class="d">${m}<div class="sm" style="font-weight:600;color:var(--muted)">${t("days")}</div></div>
       <div class="t"><b>${esc(cT(m))}</b><span class="muted sm">${esc(cD(m))}</span>${e?`<div class="st">${e.status==="eingelöst"?t("redeemed"):t("unlocked_st")}</div>`:`<div class="sm muted">${t("left_days",Math.max(0,m-S.streak.aktuell))}</div>`}</div>
       ${e&&e.status!=="eingelöst"?`<button class="btn gold" onclick="redeem(${m})">${t("redeem")}</button>`:''}</div>`}).join("")}</div>

function redeem(m){const c=S.coupons.find(x=>x.meilenstein===m);if(!c)return;c.status="eingelöst";save();

/* ---------- utils ---------- */
function val(id){const e=document.getElementById(id);return e?e.value:"";}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function q(s){return "'"+String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g," ")+"'";}

function boot(){
  mergeI18nEN();applyThemaTags();
  if(!S){onboarding();return;}
  if(!S.user.lang)S.user.lang="en";
  rolloverXp();advanceLiga();ensureChecklist();weeklyReportIfDue();renderHeader();show("home");
}
boot();
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
